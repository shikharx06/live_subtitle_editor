<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Real-Time Collaborative Subtitles Editor — architecture</title>
  <desc id="d">Clients connect over WebSocket through an L7 load balancer to a tier of stateless FastAPI app instances. Apps fan out edits and presence through Redis Pub/Sub and persist a per-project totally-ordered operation log to PostgreSQL, the single source of truth.</desc>

  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5F5E5A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="620" rx="14" fill="#FFFFFF"/>

  <text x="430" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2C2C2A">Real-Time Collaborative Subtitles Editor</text>
  <text x="430" y="50" text-anchor="middle" font-size="12.5" fill="#5F5E5A">Stateless app tier · per-project total order in Postgres · Redis for ephemeral fan-out</text>

  <!-- clients -->
  <rect x="265" y="70" width="330" height="48" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="430" y="91" text-anchor="middle" font-size="14" font-weight="700" fill="#2C2C2A">Clients</text>
  <text x="430" y="108" text-anchor="middle" font-size="11.5" fill="#444441">web client · scripted multi-client test</text>

  <line x1="430" y1="118" x2="430" y2="152" stroke="#5F5E5A" stroke-width="1.6" marker-end="url(#arw)"/>
  <text x="438" y="139" font-size="11" fill="#5F5E5A">WSS + REST</text>

  <!-- load balancer -->
  <rect x="300" y="154" width="260" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="430" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#2C2C2A">Load balancer (L7)</text>
  <text x="430" y="193" text-anchor="middle" font-size="11" fill="#444441">WS upgrade · sticky by project (best-effort)</text>

  <!-- LB fan-out to app tier -->
  <line x1="430" y1="204" x2="170" y2="244" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arw)"/>
  <line x1="430" y1="204" x2="430" y2="244" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arw)"/>
  <line x1="430" y1="204" x2="690" y2="244" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arw)"/>

  <!-- app tier -->
  <g font-size="11">
    <rect x="50" y="246" width="240" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.6"/>
    <text x="66" y="270" font-size="13.5" font-weight="700" fill="#042C53">App instance #1</text>
    <text x="66" y="290" fill="#0C447C">FastAPI · uvloop · stateless</text>
    <text x="66" y="308" fill="#0C447C">WS sessions: collab + presence</text>

    <rect x="310" y="246" width="240" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.6"/>
    <text x="326" y="270" font-size="13.5" font-weight="700" fill="#042C53">App instance #2</text>
    <text x="326" y="290" fill="#0C447C">FastAPI · uvloop · stateless</text>
    <text x="326" y="308" fill="#0C447C">WS sessions: collab + presence</text>

    <rect x="570" y="246" width="240" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.6"/>
    <text x="586" y="270" font-size="13.5" font-weight="700" fill="#042C53">App instance #N</text>
    <text x="586" y="290" fill="#0C447C">FastAPI · uvloop · stateless</text>
    <text x="586" y="308" fill="#0C447C">WS sessions: collab + presence</text>
  </g>

  <!-- bus connecting app tier to stores -->
  <line x1="170" y1="326" x2="170" y2="346" stroke="#5F5E5A" stroke-width="1.4"/>
  <line x1="430" y1="326" x2="430" y2="346" stroke="#5F5E5A" stroke-width="1.4"/>
  <line x1="690" y1="326" x2="690" y2="346" stroke="#5F5E5A" stroke-width="1.4"/>
  <line x1="170" y1="346" x2="690" y2="346" stroke="#5F5E5A" stroke-width="1.4"/>

  <!-- bus to redis (bidirectional) -->
  <line x1="225" y1="346" x2="225" y2="426" stroke="#5F5E5A" stroke-width="1.6" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text x="233" y="372" font-size="11" fill="#5F5E5A">pub/sub fan-out</text>
  <text x="233" y="386" font-size="11" fill="#5F5E5A">+ presence</text>

  <!-- bus to postgres (bidirectional) -->
  <line x1="635" y1="346" x2="635" y2="426" stroke="#5F5E5A" stroke-width="1.6" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text x="510" y="372" font-size="11" fill="#5F5E5A">commit (CAS seq → append → materialize)</text>
  <text x="510" y="386" font-size="11" fill="#5F5E5A">+ catch-up reads</text>

  <!-- redis -->
  <rect x="50" y="428" width="350" height="150" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.6"/>
  <text x="70" y="454" font-size="14" font-weight="700" fill="#412402">Redis</text>
  <text x="70" y="453" font-size="11" fill="#633806"> </text>
  <g font-size="11.5" fill="#633806">
    <text x="70" y="480">Pub/Sub — channel per project</text>
    <text x="70" y="502">Presence — HASH per project (TTL)</text>
    <text x="70" y="524">Rate limit · connection registry</text>
    <text x="70" y="552" font-style="italic" fill="#854F0B">holds no source of truth → safe to lose</text>
  </g>

  <!-- postgres -->
  <rect x="460" y="428" width="350" height="150" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.6"/>
  <text x="480" y="454" font-size="14" font-weight="700" fill="#04342C">PostgreSQL — source of truth</text>
  <g font-size="11.5" fill="#0F6E56">
    <text x="480" y="480">operations — append-only op log (= activity log)</text>
    <text x="480" y="502">projects.version — the per-project sequencer</text>
    <text x="480" y="524">segments — materialized current state</text>
    <text x="480" y="546">snapshots — compaction</text>
    <text x="480" y="568" font-style="italic" fill="#0F6E56">primary + sync replica (HA / failover)</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#444441">
    <rect x="50" y="596" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5"/>
    <text x="68" y="606">stateless app tier</text>
    <rect x="205" y="596" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B"/>
    <text x="223" y="606">cache / ephemeral (Redis)</text>
    <rect x="430" y="596" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
    <text x="448" y="606">durable source of truth (Postgres)</text>
    <rect x="700" y="596" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/>
    <text x="718" y="606">client / edge</text>
  </g>
</svg>
