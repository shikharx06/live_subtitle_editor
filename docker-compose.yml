services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: subtitles
      POSTGRES_PASSWORD: subtitles
      POSTGRES_DB: subtitles
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subtitles -d subtitles"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  app1:
    build: .
    environment:
      INSTANCE_ID: app1
      DATABASE_URL: postgresql://subtitles:subtitles@postgres:5432/subtitles
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "8001:8000"

  app2:
    build: .
    environment:
      INSTANCE_ID: app2
      DATABASE_URL: postgresql://subtitles:subtitles@postgres:5432/subtitles
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "8002:8000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build: ./web
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
